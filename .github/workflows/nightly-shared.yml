name: Nightly Shared Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: [self-hosted, linux]
    outputs:
      version: ${{ steps.meta.outputs.version }}
      app_version: ${{ steps.meta.outputs.app_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: meta
        if: steps.decide.outputs.should_run == 'true'
        run: |
          source ./script/common.sh
          compute_build_metadata nightly shared
          emit_github_outputs "$GITHUB_OUTPUT"

  build-shared:
    needs: [prepare]
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build shared nightly artifacts
        run: bash ./script/build-nightly-shared.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-shared
          path: artifacts/nightly/shared/*
          if-no-files-found: error

  publish:
    needs: [prepare, build-shared]
    runs-on: [self-hosted, linux]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: registry

      - name: Sync script files and .gitignore from main into registry
        run: |
          git fetch origin main registry
          git checkout -B registry origin/registry

          rm -rf script
          rm -f .gitignore

          git checkout origin/main -- script .gitignore

      - uses: actions/download-artifact@v4
        with:
          path: collected

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp collected/nightly-shared/* release-assets/

      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: release-assets/*

      - name: Update registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPOSITORY="${{ github.repository }}" RELEASE_TAG="$RELEASE_TAG" \
            python3 "$GITHUB_WORKSPACE/script/generate-assets-json.py" release-assets > assets.json

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          mkdir -p registry

          [ -f registry/release.json ] || echo '{"channel":"release","entries":[]}' > registry/release.json
          [ -f registry/snapshot.json ] || echo '{"channel":"snapshot","entries":[]}' > registry/snapshot.json
          [ -f registry/nightly.json ] || echo '{"channel":"nightly","entries":[]}' > registry/nightly.json

          bash "$GITHUB_WORKSPACE/script/update-channel-registry.sh" registry/nightly.json nightly "$VERSION" "$RELEASE_TAG" \
            "https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" \
            "$(cat assets.json)" \
            "Latest nightly build."

          bash "$GITHUB_WORKSPACE/script/rebuild-versions-manifest.sh" registry registry/versions.json

          git add -A script .gitignore registry/release.json registry/snapshot.json registry/nightly.json registry/versions.json
          git commit -m "[bot] Sync scripts from main and update nightly registry to $VERSION" || exit 0
          git push origin HEAD:registry
