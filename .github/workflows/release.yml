name: Release Build

on:
  push:
    tags:
      - '*-RELEASE-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override build version/tag'
        required: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: [self-hosted, linux]
    outputs:
      version: ${{ steps.meta.outputs.version }}
      app_version: ${{ steps.meta.outputs.app_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      should_format: ${{ steps.decide.outputs.should_format }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        env:
          VERSION_OVERRIDE: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
        run: |
          source ./script/common.sh
          compute_build_metadata release shared
          emit_github_outputs "$GITHUB_OUTPUT"

      - name: Decide if formatting should run
        id: decide
        run: |
          SHOULD_FORMAT=false
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
            HEAD_COMMIT=$(git rev-parse HEAD)
            echo "Tag commit: $TAG_COMMIT"
            echo "HEAD commit: $HEAD_COMMIT"
            if [ "$TAG_COMMIT" = "$HEAD_COMMIT" ]; then
              SHOULD_FORMAT=true
            fi
          fi
          echo "should_format=$SHOULD_FORMAT" >> $GITHUB_OUTPUT

  format:
    needs: prepare
    runs-on: [self-hosted, linux]
    if: needs.prepare.outputs.should_format == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Apply formatting
        run: mvn -B -Pformat clean compile spotless:apply
      - name: Commit & push if needed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "[bot] Apply code formatting"
          git push || echo "Push failed, continuing..."

  build-shared:
    needs: [prepare, format]
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build shared release artifacts
        run: bash ./script/build-release-shared.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-shared
          path: artifacts/release/shared/*
          if-no-files-found: error

  build-linux-bootstrap:
    needs: [prepare, format]
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Linux bootstrap installer
        run: bash ./script/build-release-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-bootstrap
          path: artifacts/release/linux-bootstrap/*
          if-no-files-found: error

  build-linux-standalone:
    needs: [prepare, format]
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Linux standalone app installer
        run: bash ./script/build-release-linux-standalone.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-standalone
          path: artifacts/release/linux-standalone/*
          if-no-files-found: error

  build-linux-portable:
    needs: [prepare, format]
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Linux portable app
        run: bash ./script/build-release-linux-portable.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-portable
          path: artifacts/release/linux-portable/*
          if-no-files-found: error

  build-windows-bootstrap:
    needs: [prepare, format]
    runs-on: [self-hosted, windows]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Windows bootstrap installer
        run: bash ./script/build-release-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-bootstrap
          path: artifacts/release/windows-bootstrap/*
          if-no-files-found: error

  build-windows-standalone:
    needs: [prepare, format]
    runs-on: [self-hosted, windows]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Windows standalone app installer
        run: bash ./script/build-release-windows-standalone.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-standalone
          path: artifacts/release/windows-standalone/*
          if-no-files-found: error

  build-windows-portable:
    needs: [prepare, format]
    runs-on: [self-hosted, windows]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Windows portable app
        run: bash ./script/build-release-windows-portable.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-portable
          path: artifacts/release/windows-portable/*
          if-no-files-found: error


  build-macos-bootstrap:
    needs: [prepare, format]
    runs-on: [macos-latest]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Install coreutils (gdate) and Maven
        run: |
          brew install coreutils maven
      - name: Verify
        run: |
          gdate --version
          mvn -v
      - name: Build macos bootstrap installer
        run: bash ./script/build-release-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-bootstrap
          path: artifacts/release/macos-bootstrap/*
          if-no-files-found: error

  build-macos-standalone:
    needs: [prepare, format]
    runs-on: [macos-latest]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Install coreutils (gdate) and Maven
        run: |
          brew install coreutils maven
      - name: Verify
        run: |
          gdate --version
          mvn -v
      - name: Build macos standalone app installer
        run: bash ./script/build-release-macos-standalone.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-standalone
          path: artifacts/release/macos-standalone/*
          if-no-files-found: error

  build-macos-portable:
    needs: [prepare, format]
    runs-on: [macos-latest]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Install coreutils (gdate) and Maven
        run: |
          brew install coreutils maven
      - name: Verify
        run: |
          gdate --version
          mvn -v
      - name: Build macos portable app
        run: bash ./script/build-release-macos-portable.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-portable
          path: artifacts/release/macos-portable/*
          if-no-files-found: error
          
  publish:
    needs: [prepare, build-shared, build-linux-bootstrap, build-linux-standalone, build-linux-portable, build-windows-bootstrap, build-windows-standalone, build-windows-portable, build-macos-bootstrap, build-macos-standalone, build-macos-portable]
    runs-on: [self-hosted, linux]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: registry

      - name: Sync script files and .gitignore from main into registry
        run: |
          set -euo pipefail
          
          git fetch origin main registry
          git checkout -B registry origin/registry

          rm -rf script
          rm -f .gitignore

          git checkout origin/main -- script .gitignore

      - uses: actions/download-artifact@v4
        with:
          path: collected

      - name: Prepare release assets
        run: |
          set -euo pipefail

          mkdir -p release-assets
          cp collected/release-shared/* release-assets/
          cp collected/release-linux-bootstrap/* release-assets/
          cp collected/release-linux-standalone/* release-assets/
          cp collected/release-linux-portable/* release-assets/
          cp collected/release-windows-bootstrap/* release-assets/
          cp collected/release-windows-standalone/* release-assets/
          cp collected/release-windows-portable/* release-assets/
          cp collected/release-macos-bootstrap/* release-assets/
          cp collected/release-macos-standalone/* release-assets/
          cp collected/release-macos-portable/* release-assets/

      - name: Create or update release release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: release-assets/*

      - name: Update registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPOSITORY="${{ github.repository }}" RELEASE_TAG="$RELEASE_TAG" \
            python3 "$GITHUB_WORKSPACE/script/generate-assets-json.py" release-assets > assets.json

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          mkdir -p registry

          [ -f registry/release.json ] || echo '{"channel":"release","entries":[]}' > registry/release.json
          [ -f registry/snapshot.json ] || echo '{"channel":"snapshot","entries":[]}' > registry/snapshot.json
          [ -f registry/nightly.json ] || echo '{"channel":"nightly","entries":[]}' > registry/nightly.json

          bash "$GITHUB_WORKSPACE/script/update-channel-registry.sh" registry/release.json release "$VERSION" "$RELEASE_TAG" \
            "https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" \
            "$(cat assets.json)" \
            "Latest release build."

          bash "$GITHUB_WORKSPACE/script/rebuild-versions-manifest.sh" registry registry/versions.json

          git add -A script .gitignore registry/release.json registry/snapshot.json registry/nightly.json registry/versions.json
          git commit -m "[bot] Sync scripts from main and update release registry to $VERSION" || exit 0
          git push origin HEAD:registry

      - name: Update pages download metadata
        env:
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          rm -rf pages-worktree
          git worktree prune
          git fetch origin pages
          git worktree add pages-worktree origin/pages

          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          repository = os.environ["REPOSITORY"]
          release_tag = os.environ["RELEASE_TAG"]

          base_url = f"https://github.com/{repository}/releases/download/{release_tag}"
          assets_dir = Path("release-assets")

          metadata = {
              "version": 1,
              "repository": repository,
              "releaseTag": release_tag,
              "assets": {
                  "windows": {},
                  "linux": {},
                  "macos": {}
              }
          }

          def add_asset(os_name, build_type, file_path, label):
              metadata["assets"][os_name][build_type] = {
                  "label": label,
                  "tag": release_tag,
                  "file": file_path.name,
                  "url": f"{base_url}/{file_path.name}"
              }

          for file_path in sorted(assets_dir.iterdir()):
              name = file_path.name.lower()

              if "portable-windows" in name and name.endswith(".zip"):
                  add_asset("windows", "portable", file_path, "Windows portable ZIP")

              elif "portable-linux" in name and name.endswith(".zip"):
                  add_asset("linux", "portable", file_path, "Linux portable ZIP")

              elif "portable-macos" in name and name.endswith(".zip"):
                  add_asset("macos", "portable", file_path, "MacOS portable ZIP")

              elif "app-standalone-windows" in name and name.endswith(".exe"):
                  add_asset("windows", "standalone", file_path, "Windows standalone installer")

              elif "app-standalone-linux" in name and name.endswith(".deb"):
                  add_asset("linux", "standalone", file_path, "Linux standalone .deb")

              elif "app-standalone-macos" in name and name.endswith(".dmg"):
                  add_asset("macos", "standalone", file_path, "MacOS standalone .dmg")

              elif "bootstrap-windows" in name and name.endswith(".exe"):
                  add_asset("windows", "updater", file_path, "Windows updater installer")

              elif "bootstrap-linux" in name and name.endswith(".deb"):
                  add_asset("linux", "updater", file_path, "Linux updater .deb")

              elif "bootstrap-macos" in name and name.endswith(".dmg"):
                  add_asset("macos", "updater", file_path, "MacOS updater .dmg")

              elif "bootstrap" in name and name.endswith(".jar"):
                  add_asset("other", "updater", file_path, "Cross-platform bootstrap JAR")

          output = Path("pages-worktree/metadata.json")
          output.write_text(json.dumps(metadata, indent=2) + "\n", encoding="utf-8")
          PY

          cd pages-worktree
          git add metadata.json
          git commit -m "[bot] Update pages download metadata to $RELEASE_TAG" || exit 0
          git push origin HEAD:pages
