name: Release Build

on:
  push:
    tags:
      - "v*"
      - "!v*-SNAPSHOT"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build"
        required: true

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Ensure NOT a SNAPSHOT version
        run: |
          VERSION=$(mvn -B help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Detected version: $VERSION"
          if [[ "$VERSION" == *"-SNAPSHOT"* ]]; then
            echo "Snapshot version detected. Releases must NOT be snapshots."
            exit 1
          fi
      - id: tag
        run: echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify.outputs.tag }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build Linux release artifacts
        run: ./script/build-release-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: artifacts/release/linux/**
          if-no-files-found: error

  build-windows:
    needs: verify
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify.outputs.tag }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Install WiX Toolset 3
        run: |
          choco install wixtoolset --version 3.11.2 --no-progress -y
          echo "/c/Program Files (x86)/WiX Toolset v3.11/bin" >> "$GITHUB_PATH"
      - name: Build Windows release artifacts
        run: ./script/build-release-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: artifacts/release/windows/**
          if-no-files-found: error

  publish:
    needs: [verify, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: collected
      - id: meta
        run: |
          VERSION=$(cat collected/release-linux/version.txt)
          APP_VERSION=$(cat collected/release-linux/app-version.txt)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          name: ${{ github.event.release.name || needs.verify.outputs.tag }}
          prerelease: false
          make_latest: true
          files: |
            collected/release-linux/*
            collected/release-windows/*
      - name: Update release registry branch
        env:
          RELEASE_TAG: ${{ needs.verify.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          SCRIPT_PATH="$RUNNER_TEMP/update-channel-registry.sh"
          cp script/update-channel-registry.sh "$SCRIPT_PATH"
          chmod +x "$SCRIPT_PATH"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          if git ls-remote --heads origin update-registry | grep -q update-registry; then
            git fetch origin update-registry:update-registry
            git checkout update-registry
          else
            git checkout --orphan update-registry
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p registry
          "$SCRIPT_PATH" registry/release.json release "$VERSION" "$RELEASE_TAG" \
            "https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" \
            "https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/modelizer-next-app-$VERSION.jar" \
            '["linux","windows"]' \
            "Latest stable release."
          git add registry/release.json
          git commit -m "[skip ci] Update release registry to $VERSION" || exit 0
          git push origin update-registry
