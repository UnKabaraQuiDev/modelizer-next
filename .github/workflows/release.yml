name: Release Build

on:
  push:
    tags:
      - '*-RELEASE-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override build version/tag'
        required: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: [self-hosted, linux]
    outputs:
      version: ${{ steps.meta.outputs.version }}
      app_version: ${{ steps.meta.outputs.app_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      should_format: ${{ steps.decide.outputs.should_format }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        env:
          VERSION_OVERRIDE: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
        run: |
          source ./script/common.sh
          compute_build_metadata release shared
          emit_github_outputs "$GITHUB_OUTPUT"

      - name: Decide if formatting should run
        id: decide
        run: |
          SHOULD_FORMAT=false
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
            HEAD_COMMIT=$(git rev-parse HEAD)
            echo "Tag commit: $TAG_COMMIT"
            echo "HEAD commit: $HEAD_COMMIT"
            if [ "$TAG_COMMIT" = "$HEAD_COMMIT" ]; then
              SHOULD_FORMAT=true
            fi
          fi
          echo "should_format=$SHOULD_FORMAT" >> $GITHUB_OUTPUT

  format:
    needs: prepare
    runs-on: [self-hosted, linux]

    if: needs.prepare.outputs.should_format == 'true'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Apply formatting
        run: mvn -B -Pformat clean compile spotless:apply

      - name: Commit & push if needed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "[bot] Apply code formatting"
          git push || echo "Push failed, continuing..."

  build-shared:
    needs: [prepare, format]
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build shared release artifacts
        run: bash ./script/build-release-shared.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-shared
          path: artifacts/release/shared/*
          if-no-files-found: error

  build-linux:
    needs: [prepare, format]
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Linux release artifacts
        run: bash ./script/build-release-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: artifacts/release/linux/*
          if-no-files-found: error

  build-windows:
    needs: [prepare, format]
    runs-on: [self-hosted, windows]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Windows release artifacts
        run: bash ./script/build-release-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: artifacts/release/windows/*
          if-no-files-found: error

  publish:
    needs: [prepare, build-shared, build-linux, build-windows]
    runs-on: [self-hosted, linux]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: 'registry'
      - uses: actions/download-artifact@v4
        with:
          path: collected
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp collected/release-shared/* release-assets/
          cp collected/release-linux/* release-assets/
          cp collected/release-windows/* release-assets/
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: release-assets/*
      - name: Update registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPOSITORY="${{ github.repository }}" RELEASE_TAG="$RELEASE_TAG" \
            python3 "$GITHUB_WORKSPACE/script/generate-assets-json.py" release-assets > assets.json
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          mkdir -p registry

          [ -f registry/release.json ] || echo '{"channel":"release","entries":[]}' > registry/release.json
          [ -f registry/snapshot.json ] || echo '{"channel":"snapshot","entries":[]}' > registry/snapshot.json
          [ -f registry/nightly.json ] || echo '{"channel":"nightly","entries":[]}' > registry/nightly.json

          bash "$GITHUB_WORKSPACE/script/update-channel-registry.sh" registry/release.json release "$VERSION" "$RELEASE_TAG" \
            "https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" \
            "$(cat assets.json)" \
            "Latest stable release."
          bash "$GITHUB_WORKSPACE/script/rebuild-versions-manifest.sh" registry registry/versions.json

          git add registry/nightly.json registry/release.json registry/snapshot.json registry/versions.json
          git commit -m "[bot] Update release registry to $VERSION" || exit 0
          git push origin HEAD:registry
