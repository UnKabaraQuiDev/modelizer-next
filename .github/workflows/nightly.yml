name: Nightly Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: [self-hosted, linux]
    outputs:
      version: ${{ steps.meta.outputs.version }}
      app_version: ${{ steps.meta.outputs.app_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        if: github.event_name == 'schedule'
        run: |
          LOG_OUTPUT=$(git log --since='26 hours ago' --oneline -- . ':(exclude).github/**' ':(exclude)registry/**' ':(exclude)artifacts/**' || true)
          if echo "$LOG_OUTPUT" | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
      - id: meta
        if: steps.decide.outputs.should_run == 'true'
        run: |
          source ./script/common.sh
          compute_build_metadata nightly shared
          emit_github_outputs "$GITHUB_OUTPUT"

  format:
    runs-on: [self-hosted, linux]
    needs: [prepare]
    if: github.event_name == 'workflow_dispatch' || needs.prepare.outputs.should_run == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Apply formatting
        run: mvn -B -Pformat clean compile spotless:apply
      - name: Commit & push if needed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "[bot] Apply code formatting"
          git push || echo "Push failed, continuing..."

  build-shared:
    needs: [prepare, format]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build shared nightly artifacts
        run: bash ./script/build-nightly-shared.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-shared
          path: artifacts/nightly/shared/*
          if-no-files-found: error

  build-linux-bootstrap:
    needs: [prepare, format]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Linux bootstrap installer
        run: bash ./script/build-nightly-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-linux-bootstrap
          path: artifacts/nightly/linux-bootstrap/*
          if-no-files-found: error

  build-linux-standalone:
    needs: [prepare, format]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Linux standalone app installer
        run: bash ./script/build-nightly-linux-standalone.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-linux-standalone
          path: artifacts/nightly/linux-standalone/*
          if-no-files-found: error

  build-linux-portable:
    needs: [prepare, format]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Linux portable app
        run: bash ./script/build-nightly-linux-portable.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-linux-portable
          path: artifacts/nightly/linux-portable/*
          if-no-files-found: error

  build-windows-bootstrap:
    needs: [prepare, format]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, windows]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Windows bootstrap installer
        run: bash ./script/build-nightly-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-windows-bootstrap
          path: artifacts/nightly/windows-bootstrap/*
          if-no-files-found: error

  build-windows-standalone:
    needs: [prepare, format]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, windows]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Windows standalone app installer
        run: bash ./script/build-nightly-windows-standalone.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-windows-standalone
          path: artifacts/nightly/windows-standalone/*
          if-no-files-found: error

  build-windows-portable:
    needs: [prepare, format]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, windows]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Windows portable app
        run: bash ./script/build-nightly-windows-portable.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-windows-portable
          path: artifacts/nightly/windows-portable/*
          if-no-files-found: error

  build-macos-bootstrap:
    needs: [prepare, format]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, macos]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build macos bootstrap installer
        run: bash ./script/build-nightly-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-macos-bootstrap
          path: artifacts/nightly/macos-bootstrap/*
          if-no-files-found: error

  build-macos-standalone:
    needs: [prepare, format]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, macos]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build macos standalone app installer
        run: bash ./script/build-nightly-macos-standalone.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-macos-standalone
          path: artifacts/nightly/macos-standalone/*
          if-no-files-found: error

  build-macos-portable:
    needs: [prepare, format]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, macos]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build macos portable app
        run: bash ./script/build-nightly-macos-portable.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-macos-portable
          path: artifacts/nightly/macos-portable/*
          if-no-files-found: error

  publish:
    needs: [prepare, build-shared, build-linux-bootstrap, build-linux-standalone, build-linux-portable, build-windows-bootstrap, build-windows-standalone, build-windows-portable, build-macos-bootstrap, build-macos-standalone, build-macos-portable]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, linux]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: registry

      - name: Sync script files and .gitignore from main into registry
        run: |
          git fetch origin main registry
          git checkout -B registry origin/registry

          rm -rf script
          rm -f .gitignore

          git checkout origin/main -- script .gitignore

      - uses: actions/download-artifact@v4
        with:
          path: collected

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp collected/nightly-shared/* release-assets/
          cp collected/nightly-linux-bootstrap/* release-assets/
          cp collected/nightly-linux-standalone/* release-assets/
          cp collected/nightly-linux-portable/* release-assets/
          cp collected/nightly-windows-bootstrap/* release-assets/
          cp collected/nightly-windows-standalone/* release-assets/
          cp collected/nightly-windows-portable/* release-assets/
		  cp collected/nightly-macos-bootstrap/* release-assets/
		  cp collected/nightly-macos-standalone/* release-assets/
		  cp collected/nightly-macos-portable/* release-assets/

      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: release-assets/*

      - name: Update registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPOSITORY="${{ github.repository }}" RELEASE_TAG="$RELEASE_TAG" \
            python3 "$GITHUB_WORKSPACE/script/generate-assets-json.py" release-assets > assets.json

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          mkdir -p registry

          [ -f registry/release.json ] || echo '{"channel":"release","entries":[]}' > registry/release.json
          [ -f registry/snapshot.json ] || echo '{"channel":"snapshot","entries":[]}' > registry/snapshot.json
          [ -f registry/nightly.json ] || echo '{"channel":"nightly","entries":[]}' > registry/nightly.json

          bash "$GITHUB_WORKSPACE/script/update-channel-registry.sh" registry/nightly.json nightly "$VERSION" "$RELEASE_TAG" \
            "https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" \
            "$(cat assets.json)" \
            "Latest nightly build."

          bash "$GITHUB_WORKSPACE/script/rebuild-versions-manifest.sh" registry registry/versions.json

          git add -A script .gitignore registry/release.json registry/snapshot.json registry/nightly.json registry/versions.json
          git commit -m "[bot] Sync scripts from main and update nightly registry to $VERSION" || exit 0
          git push origin HEAD:registry
