name: Nightly Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: [self-hosted, linux]
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      version: ${{ steps.meta.outputs.version }}
      app_version: ${{ steps.meta.outputs.app_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        if: github.event_name == 'schedule'
        run: |
          LOG_OUTPUT=$(git log --since='26 hours ago' --oneline -- . ':(exclude).github/**' ':(exclude)registry/**' ':(exclude)artifacts/**' || true)
          if echo "$LOG_OUTPUT" | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
      - id: meta
        if: steps.decide.outputs.should_run == 'true'
        run: |
          source ./script/common.sh
          compute_build_metadata nightly shared
          emit_github_outputs "$GITHUB_OUTPUT"

  build-shared:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build shared nightly artifacts
        run: bash ./script/build-nightly-shared.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-shared
          path: artifacts/nightly/shared/*
          if-no-files-found: error

  build-linux:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build Linux nightly artifacts
        run: bash ./script/build-nightly-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-linux
          path: artifacts/nightly/linux/*
          if-no-files-found: error

  build-windows:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, windows]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build Windows nightly artifacts
        run: bash ./script/build-nightly-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-windows
          path: artifacts/nightly/windows/*
          if-no-files-found: error

  publish:
    needs: [prepare, build-shared, build-linux, build-windows]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: [self-hosted, linux]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: collected
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp collected/nightly-shared/* release-assets/
          cp collected/nightly-linux/* release-assets/
          cp collected/nightly-windows/* release-assets/
      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Nightly ${{ env.VERSION }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: release-assets/*
      - name: Update registry on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY' > assets.json
          from pathlib import Path
          import json
          repo = "${{ github.repository }}"
          tag = "${RELEASE_TAG}"
          assets = []
          for path in sorted(Path('release-assets').iterdir()):
              if not path.is_file():
                  continue
              name = path.name
              platform = 'linux' if '-linux-' in name else 'windows' if '-windows-' in name else 'portable'
              kind = 'bootstrap'
              if name.startswith('modelizer-next-app-portable-'):
                  kind = 'app-portable-native'
              elif name.startswith('modelizer-next-app-') and name.endswith('.jar'):
                  kind = 'app-portable-jar'
              elif name.startswith('modelizer-next-bootstrap-') and name.endswith('.jar'):
                  kind = 'bootstrap-jar'
              elif name.startswith('modelizer-next-bootstrap-'):
                  kind = 'bootstrap-native'
              assets.append({
                  'name': name,
                  'platform': platform,
                  'kind': kind,
                  'url': f'https://github.com/{repo}/releases/download/{tag}/{name}'
              })
          print(json.dumps(assets))
          PY

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          mkdir -p registry

          [ -f registry/release.json ] || echo '{"channel":"release","entries":[]}' > registry/release.json
          [ -f registry/snapshot.json ] || echo '{"channel":"snapshot","entries":[]}' > registry/snapshot.json
          [ -f registry/nightly.json ] || echo '{"channel":"nightly","entries":[]}' > registry/nightly.json

          bash script/update-channel-registry.sh registry/nightly.json nightly "$VERSION" "$RELEASE_TAG" \
            "https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" \
            "$(cat assets.json)" \
            "Latest nightly build."

          bash script/rebuild-versions-manifest.sh registry registry/versions.json

          git add registry/nightly.json registry/release.json registry/snapshot.json registry/versions.json
          git commit -m "[bot] Update nightly registry to $VERSION" || exit 0
          git push origin HEAD:main