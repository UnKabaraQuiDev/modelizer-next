name: Maven Package (Nightly)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: self-hosted

    outputs:
      should_run: ${{ steps.decision.outputs.should_run }}
      is_snapshot: ${{ steps.snapshot.outputs.is_snapshot }}
      version: ${{ steps.snapshot.output.version }}
      date: ${{ steps.prepare.outputs.date }}
      tag: ${{ steps.decision.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for commits in last 26h
        id: changes
        if: github.event_name == 'schedule'
        run: |
          LOG_OUTPUT=$(git log \
            --since='26 hours ago' \
            --oneline \
            -- . ':(exclude).github/**' \
            | grep -v '\[bot\]' \
            | grep -v 'github-actions' \
            | grep -v '^\[NIGHTLY\]' \
            || true)

          echo "Git log output:"
          echo "$LOG_OUTPUT"
          
          if echo "$LOG_OUTPUT" | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect SNAPSHOT version
        id: snapshot
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
            echo "is_snapshot=true" >> $GITHUB_OUTPUT
          else
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
          fi

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Decide if pipeline should run
        id: decision
        run: |
          HAS_CHANGES="${{ steps.changes.outputs.has_changes }}"
          IS_SNAPSHOT="${{ steps.snapshot.outputs.is_snapshot }}"

          echo "has_changes=$HAS_CHANGES"
          echo "is_snapshot=$IS_SNAPSHOT"
          echo "event=${{ github.event_name }}"

          echo "tag=${{ steps.snapshot.outputs.version }}-NIGHTLY-${{ steps.date.outputs.date }}" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [[ "$IS_SNAPSHOT" == "true" && "$HAS_CHANGES" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  format:
    runs-on: self-hosted
    needs: prepare
    if: github.event_name == 'workflow_dispatch' || needs.prepare.outputs.should_run == 'true'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Apply formatting
        run: mvn -B -Pformat initialize spotless:apply

      - name: Commit & push if needed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git diff --cached --quiet || git commit -m "[NIGHTLY] Apply code formatting"

          git push || echo "Push failed, continuing..."

          TAG=${{ needs.prepare.outputs.tag }}

          git tag "$TAG"
          git push origin "$TAG"

  build:
    runs-on: self-hosted
    needs: [prepare, format]
    if: github.event_name == 'workflow_dispatch' || needs.prepare.outputs.should_run == 'true'

    permissions:
      contents: write

    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          server-id: nexus.kbra.lu-snapshots
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build and deploy
        run: mvn -B -Pall clean compile package install deploy

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.prepare.outputs.tag }}
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: "target/*.jar"
          make_latest: false
          prerelease: true
