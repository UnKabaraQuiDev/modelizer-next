name: Snapshot Build

on:
  push:
    tags:
      - '*-SNAPSHOT-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override build version/tag'
        required: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: [self-hosted, linux]
    outputs:
      version: ${{ steps.meta.outputs.version }}
      app_version: ${{ steps.meta.outputs.app_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        env:
          VERSION_OVERRIDE: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
        run: |
          source ./script/common.sh
          compute_build_metadata snapshot shared
          emit_github_outputs "$GITHUB_OUTPUT"

  build-shared:
    needs: prepare
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build shared snapshot artifacts
        run: bash ./script/build-snapshot-shared.sh
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-shared
          path: artifacts/snapshot/shared/*
          if-no-files-found: error

  build-linux:
    needs: prepare
    runs-on: [self-hosted, linux]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Linux snapshot artifacts
        run: bash ./script/build-snapshot-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-linux
          path: artifacts/snapshot/linux/*
          if-no-files-found: error

  build-windows:
    needs: prepare
    runs-on: [self-hosted, windows]
    env:
      VERSION_OVERRIDE: ${{ needs.prepare.outputs.version }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build Windows snapshot artifacts
        run: bash ./script/build-snapshot-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-windows
          path: artifacts/snapshot/windows/*
          if-no-files-found: error

  publish:
    needs: [prepare, build-shared, build-linux, build-windows]
    runs-on: [self-hosted, linux]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: collected
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp collected/snapshot-shared/* release-assets/
          cp collected/snapshot-linux/* release-assets/
          cp collected/snapshot-windows/* release-assets/
      - name: Create or update snapshot release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Snapshot ${{ env.VERSION }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: release-assets/*
      - name: Update registry on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPOSITORY="${{ github.repository }}" RELEASE_TAG="$RELEASE_TAG" \
            python3 "$GITHUB_WORKSPACE/script/generate-assets-json.py" release-assets > assets.json
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          mkdir -p registry

          [ -f registry/release.json ] || echo '{"channel":"release","entries":[]}' > registry/release.json
          [ -f registry/snapshot.json ] || echo '{"channel":"snapshot","entries":[]}' > registry/snapshot.json
          [ -f registry/nightly.json ] || echo '{"channel":"nightly","entries":[]}' > registry/nightly.json

          bash "$GITHUB_WORKSPACE/script/update-channel-registry.sh" registry/snapshot.json snapshot "$VERSION" "$RELEASE_TAG" \
            "https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" \
            "$(cat assets.json)" \
            "Latest snapshot build."
          bash "$GITHUB_WORKSPACE/script/rebuild-versions-manifest.sh" registry registry/versions.json

          git add registry/nightly.json registry/release.json registry/snapshot.json registry/versions.json
          git commit -m "[bot] Update snapshot registry to $VERSION" || exit 0
          git push origin HEAD:main
