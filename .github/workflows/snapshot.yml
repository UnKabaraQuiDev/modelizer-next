name: Snapshot Build

on:
  push:
    tags:
      - "v*-SNAPSHOT"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build"
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Build Linux snapshot artifacts
        run: bash ./script/build-snapshot-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-linux
          path: artifacts/snapshot/linux/**
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Install WiX Toolset 3
        run: |
          choco install wixtoolset --version 3.11.2 --no-progress -y || true
          echo "/c/Program Files (x86)/WiX Toolset v3.11/bin" >> "$GITHUB_PATH"
      - name: Build Windows snapshot artifacts
        run: bash ./script/build-snapshot-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-windows
          path: artifacts/snapshot/windows/**
          if-no-files-found: error

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: collected
      - id: meta
        run: |
          RELEASE_TAG=$(cat collected/snapshot-linux/release-tag.txt)
          VERSION=$(cat collected/snapshot-linux/version.txt)
          APP_VERSION=$(cat collected/snapshot-linux/app-version.txt)
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create or update snapshot release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: Snapshot ${{ steps.meta.outputs.version }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            collected/snapshot-linux/*
            collected/snapshot-windows/*
      - name: Update snapshot registry branch
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          SCRIPT_PATH="$RUNNER_TEMP/update-channel-registry.sh"
          cp script/update-channel-registry.sh "$SCRIPT_PATH"
          chmod +x "$SCRIPT_PATH"
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          if git ls-remote --heads origin update-registry | grep -q update-registry; then
            git fetch origin update-registry:update-registry
            git checkout update-registry
          else
            git checkout --orphan update-registry
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p registry
          bash "$SCRIPT_PATH" registry/snapshot.json snapshot "$VERSION" "$RELEASE_TAG" \
            "https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG" \
            "https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/modelizer-next-app-$VERSION.jar" \
            '["linux","windows"]' \
            "Latest snapshot build."
          git add registry/snapshot.json
          git commit -m "[bot] Update snapshot registry to $VERSION" || exit 0
          git push origin update-registry
